<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지존 길드 성장률 대시보드</title>
<style>

  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #22263a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --text2: #8b90a8;
    --text3: #555c78;
    --accent: #6c72f5;
    --accent2: #4fc3a1;
    --red: #f06073;
    --amber: #f5a623;
    --green: #4fc3a1;
    --blue: #6c72f5;
    --purple: #a78bfa;
    --guild-g: #6c72f5;
    --guild-t: #4fc3a1;
    --guild-s: #f5a623;
    --guild-j: #f06073;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  header {
    padding: 2.5rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 1.5rem;
    flex-wrap: wrap;
    background: linear-gradient(135deg, rgba(108,114,245,0.08) 0%, transparent 60%);
  }

  .header-title {
    flex: 1;
    min-width: 200px;
  }

  .header-eyebrow {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 0.4rem;
  }

  header h1 {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .header-sub {
    font-size: 13px;
    color: var(--text2);
    margin-top: 0.3rem;
  }

  .header-meta {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .meta-pill {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px 14px;
    font-size: 12px;
    color: var(--text2);
  }

  .main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .tab-row {
    display: flex;
    gap: 6px;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  .tab {
    padding: 8px 20px;
    border-radius: 99px;
    border: 1px solid var(--border2);
    background: transparent;
    cursor: pointer;
    font-size: 13px;
    color: var(--text2);
    font-family: inherit;
    transition: all 0.15s;
  }

  .tab:hover { border-color: var(--accent); color: var(--text); }

  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .controls label {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  select {
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--bg2);
    color: var(--text);
    font-family: inherit;
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s;
  }

  select:focus { border-color: var(--accent); }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 1.8rem;
  }

  .summary-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    transition: border-color 0.15s;
  }

  .summary-card:hover { border-color: var(--border2); }

  .summary-card .val {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .summary-card .lbl {
    font-size: 11px;
    color: var(--text3);
    margin-top: 3px;
    letter-spacing: 0.04em;
  }

  .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 640px; }

  thead th {
    background: var(--bg2);
    text-align: left;
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  thead th:hover { color: var(--text2); }

  td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    color: var(--text);
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .guild-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 10px;
    font-weight: 500;
    border: 1px solid;
    white-space: nowrap;
  }

  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }

  .badge-new { background: rgba(108,114,245,0.15); color: #a5a8fc; border: 1px solid rgba(108,114,245,0.3); }
  .badge-up-high { background: rgba(79,195,161,0.15); color: #4fc3a1; border: 1px solid rgba(79,195,161,0.3); }
  .badge-up { background: rgba(79,195,161,0.08); color: #3da88a; border: 1px solid rgba(79,195,161,0.2); }
  .badge-flat { background: rgba(139,144,168,0.1); color: var(--text3); border: 1px solid var(--border); }
  .badge-down { background: rgba(240,96,115,0.12); color: #f06073; border: 1px solid rgba(240,96,115,0.25); }

  .bar-wrap { display: flex; align-items: center; gap: 8px; min-width: 80px; }
  .bar-bg { flex: 1; height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s ease; }

  .rank-num { color: var(--text3); font-size: 12px; font-variant-numeric: tabular-nums; }

  .section { display: none; }
  .section.active { display: block; }

  .nickname { font-weight: 500; }

  .val-main { font-variant-numeric: tabular-nums; }
  .val-prev { color: var(--text3); font-size: 12px; }

  footer {
    text-align: center;
    padding: 2rem;
    font-size: 11px;
    color: var(--text3);
    border-top: 1px solid var(--border);
    margin-top: 4rem;
  }

  @media (max-width: 640px) {
    header { padding: 1.5rem 1rem 1rem; }
    .main { padding: 1.25rem 1rem 3rem; }
    .summary-card .val { font-size: 20px; }
  }
</style>
</head>

<header>
  <div class="header-title">
    <div class="header-eyebrow">Guild Analytics</div>
    <h1>지존 길드 성장률 대시보드</h1>
    <p class="header-sub">전투력 &amp; 토벌전 점수 변화 추적 · 6/8 → 6/15 기준</p>
  </div>
  <div class="header-meta">
    <span class="meta-pill">지존길드</span>
    <span class="meta-pill">지존꿀떡</span>
    <span class="meta-pill">지존좀쓴</span>
    <span class="meta-pill">지존꿀잼</span>
  </div>
</header>

<div class="main">
  <div class="tab-row">
    <button class="tab active" onclick="switchTab('power')">⚔️ 전투력 성장</button>
    <button class="tab" onclick="switchTab('tobeol')">🏹 토벌전 점수 성장</button>
  </div>

  <!-- 전투력 -->
  <div id="sec-power" class="section active">
    <div class="controls">
      <label>길드</label>
      <select id="filter-guild-power" onchange="renderPower()">
        <option value="all">전체</option>
        <option value="지존길드">지존길드</option>
        <option value="지존꿀떡">지존꿀떡</option>
        <option value="지존좀쓴">지존좀쓴</option>
        <option value="지존꿀잼">지존꿀잼</option>
      </select>
      <label style="margin-left:8px;">정렬</label>
      <select id="sort-power" onchange="renderPower()">
        <option value="rate-desc">성장률 높은순</option>
        <option value="rate-asc">성장률 낮은순</option>
        <option value="power-desc">현재 전투력 높은순</option>
        <option value="level-desc">레벨 높은순</option>
      </select>
    </div>
    <div id="summary-power" class="summary-grid"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:36px;">#</th>
            <th style="width:80px;">길드</th>
            <th style="width:110px;">닉네임</th>
            <th style="width:50px;">레벨</th>
            <th style="width:130px;">6/15 전투력</th>
            <th style="width:130px;">6/8 전투력</th>
            <th style="width:140px;">성장</th>
            <th style="width:90px;">상태</th>
          </tr>
        </thead>
        <tbody id="tbody-power"></tbody>
      </table>
    </div>
  </div>

  <!-- 토벌전 -->
  <div id="sec-tobeol" class="section">
    <div class="controls">
      <label>길드</label>
      <select id="filter-guild-tobeol" onchange="renderTobeol()">
        <option value="all">전체</option>
        <option value="지존길드">지존길드</option>
        <option value="지존꿀떡">지존꿀떡</option>
        <option value="지존좀쓴">지존좀쓴</option>
        <option value="지존꿀잼">지존꿀잼</option>
      </select>
      <label style="margin-left:8px;">정렬</label>
      <select id="sort-tobeol" onchange="renderTobeol()">
        <option value="rate-desc">성장률 높은순</option>
        <option value="rate-asc">성장률 낮은순</option>
        <option value="score-desc">최근 점수 높은순</option>
        <option value="level-desc">레벨 높은순</option>
      </select>
    </div>
    <div id="summary-tobeol" class="summary-grid"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:36px;">#</th>
            <th style="width:80px;">길드</th>
            <th style="width:110px;">닉네임</th>
            <th style="width:50px;">레벨</th>
            <th style="width:130px;">6/14 점수</th>
            <th style="width:130px;">6/7 점수</th>
            <th style="width:140px;">성장</th>
            <th style="width:90px;">상태</th>
          </tr>
        </thead>
        <tbody id="tbody-tobeol"></tbody>
      </table>
    </div>
  </div>
</div>

<footer>지존 길드 내부 자료 · 6/15 기준 · 외부 무단 공유 금지</footer>

function fmtPower(n) {
  if (!n) return '-';
  const jo = Math.floor(n / 1e12);
  const rem = n % 1e12;
  const eok = Math.floor(rem / 1e8);
  if (jo > 0 && eok > 0) return jo + '조 ' + eok.toLocaleString() + '억';
  if (jo > 0) return jo + '조';
  return eok.toLocaleString() + '억';
}

function fmtScore(n) {
  if (!n) return '-';
  const eok = Math.floor(n / 1e8);
  const man = Math.floor((n % 1e8) / 1e4);
  if (eok > 0 && man > 0) return eok.toLocaleString() + '억 ' + man.toLocaleString() + '만';
  if (eok > 0) return eok.toLocaleString() + '억';
  return Math.round(n / 1e4).toLocaleString() + '만';
}

function getRate(a, b) { if (!b) return null; return (a - b) / b; }

function badge(r, isNew) {
  if (isNew) return '<span class="badge badge-new">신규</span>';
  if (r === null) return '<span class="badge badge-flat">-</span>';
  if (r < -0.05) return '<span class="badge badge-down">▼ ' + (r*100).toFixed(1) + '%</span>';
  if (r < 0.02)  return '<span class="badge badge-flat">→ ' + (r*100).toFixed(1) + '%</span>';
  if (r < 0.2)   return '<span class="badge badge-up">▲ ' + (r*100).toFixed(1) + '%</span>';
  return '<span class="badge badge-up-high">▲ ' + (r*100).toFixed(1) + '%</span>';
}

function barColor(r) {
  if (r === null || r < 0) return '#f06073';
  if (r < 0.1) return '#555c78';
  if (r < 0.2) return '#4fc3a1';
  return '#6c72f5';
}

function buildSummary(elId, data) {
  const valid = data.filter(d => !d.isNew && d.r !== null);
  const avg = valid.length ? valid.reduce((s,d)=>s+d.r,0)/valid.length : 0;
  const top = valid.length ? valid.reduce((a,b)=>a.r>b.r?a:b) : null;
  const downs = valid.filter(d=>d.r<0).length;
  document.getElementById(elId).innerHTML = `
    <div class="summary-card"><div class="val">${data.length}명</div><div class="lbl">전체 길드원</div></div>
    <div class="summary-card"><div class="val" style="color:#4fc3a1;">${(avg*100).toFixed(1)}%</div><div class="lbl">평균 성장률</div></div>
    <div class="summary-card"><div class="val" style="color:#6c72f5;font-size:16px;">${top ? top.n : '-'}</div><div class="lbl">최고 성장 ${top ? '(+' + (top.r*100).toFixed(1)+'%)' : ''}</div></div>
    <div class="summary-card"><div class="val" style="color:#f06073;">${downs}명</div><div class="lbl">수치 감소</div></div>
  `;
}

function buildRows(tbodyId, data, fmt1, fmt2) {
  const maxR = Math.max(...data.filter(d=>!d.isNew&&d.r!==null).map(d=>Math.abs(d.r)), 0.01);
  document.getElementById(tbodyId).innerHTML = data.map((d, i) => {
    const barW = d.isNew ? 100 : d.r === null ? 0 : Math.min(100, (Math.abs(d.r)/maxR)*100);
    const gc = guildColor[d.g] || '#888';
    const v1 = fmt1 === 'power' ? fmtPower(d.p1 || d.s1) : fmtScore(d.s1);
    const v0 = fmt1 === 'power' ? (d.p0 ? fmtPower(d.p0) : '-') : (d.s0 ? fmtScore(d.s0) : '-');
    const val1 = d.p1 !== undefined ? d.p1 : d.s1;
    const val0 = d.p0 !== undefined ? d.p0 : d.s0;
    return `<tr>
      <td class="rank-num">${i+1}</td>
      <td><span class="guild-tag" style="border-color:${gc};color:${gc};">${d.g}</span></td>
      <td class="nickname">${d.n}</td>
      <td style="color:#555c78;">Lv.${d.lv}</td>
      <td class="val-main">${fmtPower !== undefined && fmt1 === 'power' ? fmtPower(val1) : fmtScore(val1)}</td>
      <td class="val-prev">${val0 ? (fmt1 === 'power' ? fmtPower(val0) : fmtScore(val0)) : '-'}</td>
      <td><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${barW.toFixed(1)}%;background:${d.isNew?'#6c72f5':barColor(d.r)};"></div></div></div></td>
      <td>${badge(d.r, d.isNew)}</td>
    </tr>`;
  }).join('');
}

function renderPower() {
  const gf = document.getElementById('filter-guild-power').value;
  const sf = document.getElementById('sort-power').value;
  let data = powerData
    .filter(d => gf === 'all' || d.g === gf)
    .map(d => ({...d, r: d.p0 === 0 ? null : getRate(d.p1, d.p0), isNew: d.p0 === 0}));
  if (sf === 'rate-desc') data.sort((a,b)=>(b.isNew?2:(b.r??-99))-(a.isNew?2:(a.r??-99)));
  else if (sf === 'rate-asc') data.sort((a,b)=>(a.isNew?99:(a.r??-99))-(b.isNew?99:(b.r??-99)));
  else if (sf === 'power-desc') data.sort((a,b)=>b.p1-a.p1);
  else data.sort((a,b)=>b.lv-a.lv);
  buildSummary('summary-power', data);
  buildRows('tbody-power', data, 'power');
}

function renderTobeol() {
  const gf = document.getElementById('filter-guild-tobeol').value;
  const sf = document.getElementById('sort-tobeol').value;
  let data = tobeolData
    .filter(d => gf === 'all' || d.g === gf)
    .map(d => ({...d, r: d.s0 === 0 ? null : getRate(d.s1, d.s0), isNew: d.s0 === 0 && d.s1 > 0}));
  if (sf === 'rate-desc') data.sort((a,b)=>(b.isNew?2:(b.r??-99))-(a.isNew?2:(a.r??-99)));
  else if (sf === 'rate-asc') data.sort((a,b)=>(a.isNew?99:(a.r??-99))-(b.isNew?99:(b.r??-99)));
  else if (sf === 'score-desc') data.sort((a,b)=>b.s1-a.s1);
  else data.sort((a,b)=>b.lv-a.lv);
  buildSummary('summary-tobeol', data);
  buildRows('tbody-tobeol', data, 'tobeol');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='power')||(i===1&&tab==='tobeol')));
  document.getElementById('sec-power').classList.toggle('active', tab==='power');
  document.getElementById('sec-tobeol').classList.toggle('active', tab==='tobeol');
}

renderPower();
renderTobeol();
